# ─────────────────────────────────────────────────────────────────────────────
# Frontend-only pipeline
#
# Triggered by: changes to frontend/** on any branch
# Purpose:      build → docker build → push → deploy the React/nginx service
#
# Recommended Cloud Build trigger settings:
#   Included files filter:  frontend/**
#   Excluded files filter:  backend/**, terraform/**
#   Substitutions:
#     _ENV               = dev | staging | prod  (default: dev)
#     _REGION            = us-central1           (default: us-central1)
#     _AR_REPO           = enterprise-ai-platform
#     _SERVICE_FRONTEND  = enterprise-ai-frontend
#
# Required Cloud Build SA roles:
#   roles/artifactregistry.writer
#   roles/run.developer
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _ENV: dev
  _REGION: us-central1
  _AR_REPO: enterprise-ai-platform
  _SERVICE_FRONTEND: enterprise-ai-frontend
  # URL of the deployed backend Cloud Run service.
  # Vite bakes this into the JS bundle at build time as import.meta.env.VITE_API_URL.
  # Override in the Cloud Build trigger if the project number changes.
  _BACKEND_URL: https://enterprise-ai-backend-611331021574.us-central1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

steps:
  # ── npm ci + Vite production build ───────────────────────────
  # VITE_API_URL is injected here so Vite bakes the backend URL into
  # the static bundle.  Without it the client falls back to localhost:8000.
  - name: node:20-slim
    id: frontend-build
    dir: frontend
    env:
      - VITE_API_URL=${_BACKEND_URL}
    entrypoint: bash
    args:
      - -c
      - |
        npm ci
        npm run build

  # ── Build Docker image (nginx) ────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: frontend-docker-build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:latest
      - -f
      - frontend/Dockerfile
      - frontend/
    waitFor: [frontend-build]

  # ── Push to Artifact Registry ─────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: frontend-push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}
    waitFor: [frontend-docker-build]

  # ── Deploy to Cloud Run ───────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: frontend-deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_FRONTEND}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
    waitFor: [frontend-push]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:$COMMIT_SHA
