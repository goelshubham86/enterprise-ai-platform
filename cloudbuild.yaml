# ─────────────────────────────────────────────────────────────────────────────
# Enterprise AI Platform — Full CI/CD Pipeline
#
# Use this file when you need to deploy any combination of components in one run.
# For component-scoped triggers, use the dedicated pipeline files instead:
#
#   cloudbuild.terraform.yaml  ← Terraform only
#   cloudbuild.backend.yaml    ← Backend only
#   cloudbuild.frontend.yaml   ← Frontend only
#
# ─── Selective execution via substitution flags ───────────────────────────────
#
#   Flag               Default    Effect when "true"
#   ─────────────────  ─────────  ──────────────────────────────────────────
#   _DEPLOY_TERRAFORM  "true"     Run tf-init → tf-validate → tf-plan
#   _APPLY_INFRA       "false"    Also run tf-apply (provision/change infra)
#   _DEPLOY_BACKEND    "true"     Run test → build → push → Cloud Run deploy
#   _DEPLOY_FRONTEND   "true"     Run build → docker → push → Cloud Run deploy
#
# Examples (passed via --substitutions flag or trigger config):
#
#   Full deploy (all on):
#     _DEPLOY_TERRAFORM=true _APPLY_INFRA=true _DEPLOY_BACKEND=true _DEPLOY_FRONTEND=true
#
#   Terraform plan + backend deploy only:
#     _DEPLOY_TERRAFORM=true _APPLY_INFRA=false _DEPLOY_BACKEND=true _DEPLOY_FRONTEND=false
#
#   Frontend only:
#     _DEPLOY_TERRAFORM=false _DEPLOY_BACKEND=false _DEPLOY_FRONTEND=true
#
#   Infra apply only:
#     _DEPLOY_TERRAFORM=true _APPLY_INFRA=true _DEPLOY_BACKEND=false _DEPLOY_FRONTEND=false
#
# ─── Manual trigger from gcloud CLI ──────────────────────────────────────────
#
#   gcloud builds submit . \
#     --config=cloudbuild.yaml \
#     --substitutions=_DEPLOY_TERRAFORM=false,_DEPLOY_BACKEND=false,_DEPLOY_FRONTEND=true
#
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _ENV: dev
  _REGION: us-central1
  _DEPLOY_TERRAFORM: "true"
  _APPLY_INFRA: "false"
  _DEPLOY_BACKEND: "true"
  _DEPLOY_FRONTEND: "true"
  _AR_REPO: enterprise-ai-platform
  _SERVICE_BACKEND: enterprise-ai-backend
  _SERVICE_FRONTEND: enterprise-ai-frontend
  _GCS_BUCKET_NAME: enterprise-ai-documents-dev
  _GCS_UPLOAD_PREFIX: documents-dev
  _CHROMA_PERSIST_DIR: /tmp/chroma
  _CHROMA_COLLECTION_NAME: documents-dev

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

# ─────────────────────────────────────────────────────────────
# STAGE 1 — TERRAFORM
# All tf-* steps are skipped when _DEPLOY_TERRAFORM=false.
# ─────────────────────────────────────────────────────────────
steps:

  # 1a. Init
  - name: hashicorp/terraform:1.9
    id: tf-init
    dir: terraform/environments/${_ENV}
    entrypoint: sh
    args:
      - -c
      - |
        if [ "${_DEPLOY_TERRAFORM}" = "true" ]; then
          terraform init -input=false -reconfigure
        else
          echo "Skipping Terraform (_DEPLOY_TERRAFORM=false)"
        fi
    env:
      - TF_IN_AUTOMATION=true

  # 1b. Validate
  - name: hashicorp/terraform:1.9
    id: tf-validate
    dir: terraform/environments/${_ENV}
    entrypoint: sh
    args:
      - -c
      - |
        if [ "${_DEPLOY_TERRAFORM}" = "true" ]; then
          terraform validate
        else
          echo "Skipping Terraform validate"
        fi
    waitFor: [tf-init]

  # 1c. TFLint: static analysis (runs in parallel with validate)
  #
  # Checks naming conventions, required_version hygiene (terraform plugin)
  # and GCP-specific rules (google plugin). No GCP credentials required.
  - name: ghcr.io/terraform-linters/tflint:v0.54.0
    id: tf-lint
    dir: terraform
    entrypoint: sh
    args:
      - -c
      - |
        if [ "${_DEPLOY_TERRAFORM}" = "true" ]; then
          echo "━━━ TFLint: downloading plugins ━━━"
          tflint --init
          echo "━━━ TFLint: linting all modules and environments ━━━"
          tflint --recursive --format=compact
        else
          echo "Skipping TFLint (_DEPLOY_TERRAFORM=false)"
        fi
    waitFor: [tf-init]

  # 1d. Plan (always read-only — safe to run on every push)
  - name: hashicorp/terraform:1.9
    id: tf-plan
    dir: terraform/environments/${_ENV}
    entrypoint: sh
    args:
      - -c
      - |
        if [ "${_DEPLOY_TERRAFORM}" = "true" ]; then
          terraform plan \
            -input=false \
            -out=tfplan \
            -var=project_id=$PROJECT_ID \
            -var=region=${_REGION}
        else
          echo "Skipping Terraform plan"
        fi
    env:
      - TF_IN_AUTOMATION=true
    waitFor: [tf-validate, tf-lint]

  # 1d. Apply — only when _DEPLOY_TERRAFORM=true AND _APPLY_INFRA=true
  - name: hashicorp/terraform:1.9
    id: tf-apply
    dir: terraform/environments/${_ENV}
    entrypoint: sh
    args:
      - -c
      - |
        if [ "${_DEPLOY_TERRAFORM}" = "true" ] && [ "${_APPLY_INFRA}" = "true" ]; then
          echo "━━━ Applying Terraform for ${_ENV} ━━━"
          terraform apply -input=false -auto-approve tfplan
          terraform output
        elif [ "${_DEPLOY_TERRAFORM}" = "true" ]; then
          echo "━━━ Plan-only mode — set _APPLY_INFRA=true to apply ━━━"
        else
          echo "Skipping Terraform apply"
        fi
    env:
      - TF_IN_AUTOMATION=true
    waitFor: [tf-plan]

# ─────────────────────────────────────────────────────────────
# STAGE 2 — BACKEND
# All backend-* steps are skipped when _DEPLOY_BACKEND=false.
# Waits for tf-apply so infra (buckets, etc.) exists first.
# ─────────────────────────────────────────────────────────────

  # 2a. Python tests
  - name: python:3.12-slim
    id: backend-test
    dir: backend
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_BACKEND}" = "true" ]; then
          pip install -r requirements.txt -q
          python -m pytest tests/ -v --tb=short
        else
          echo "Skipping backend test (_DEPLOY_BACKEND=false)"
        fi
    waitFor: [tf-apply]

  # 2b. Docker build
  - name: gcr.io/cloud-builders/docker
    id: backend-build
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_BACKEND}" = "true" ]; then
          docker build \
            -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_BACKEND}:$COMMIT_SHA \
            -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_BACKEND}:latest \
            -f backend/Dockerfile backend/
        else
          echo "Skipping backend docker build"
        fi
    waitFor: [backend-test]

  # 2c. Push
  - name: gcr.io/cloud-builders/docker
    id: backend-push
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_BACKEND}" = "true" ]; then
          docker push --all-tags \
            ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_BACKEND}
        else
          echo "Skipping backend push"
        fi
    waitFor: [backend-build]

  # 2d. Cloud Run deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: backend-deploy
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_BACKEND}" = "true" ]; then
          gcloud run deploy ${_SERVICE_BACKEND} \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_BACKEND}:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},APP_ENV=${_ENV},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},GCS_UPLOAD_PREFIX=${_GCS_UPLOAD_PREFIX},CHROMA_PERSIST_DIR=${_CHROMA_PERSIST_DIR},CHROMA_COLLECTION_NAME=${_CHROMA_COLLECTION_NAME}" \
            --startup-cpu-boost \
            --startup-probe="httpGet.path=/api/v1/health,periodSeconds=10,failureThreshold=6,initialDelaySeconds=5"
        else
          echo "Skipping backend Cloud Run deploy"
        fi
    waitFor: [backend-push]

# ─────────────────────────────────────────────────────────────
# STAGE 3 — FRONTEND
# Runs in parallel with backend (both wait on tf-apply).
# All frontend-* steps are skipped when _DEPLOY_FRONTEND=false.
# ─────────────────────────────────────────────────────────────

  # 3a. npm ci + Vite build
  - name: node:20-slim
    id: frontend-build
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_FRONTEND}" = "true" ]; then
          npm ci
          npm run build
        else
          echo "Skipping frontend build (_DEPLOY_FRONTEND=false)"
        fi
    waitFor: [tf-apply]

  # 3b. Docker build
  - name: gcr.io/cloud-builders/docker
    id: frontend-docker-build
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_FRONTEND}" = "true" ]; then
          docker build \
            -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:$COMMIT_SHA \
            -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:latest \
            -f frontend/Dockerfile frontend/
        else
          echo "Skipping frontend docker build"
        fi
    waitFor: [frontend-build]

  # 3c. Push
  - name: gcr.io/cloud-builders/docker
    id: frontend-push
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_FRONTEND}" = "true" ]; then
          docker push --all-tags \
            ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}
        else
          echo "Skipping frontend push"
        fi
    waitFor: [frontend-docker-build]

  # 3d. Cloud Run deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: frontend-deploy
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_DEPLOY_FRONTEND}" = "true" ]; then
          gcloud run deploy ${_SERVICE_FRONTEND} \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1
        else
          echo "Skipping frontend Cloud Run deploy"
        fi
    waitFor: [frontend-push]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_BACKEND}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_FRONTEND}:$COMMIT_SHA
